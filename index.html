<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Performance Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0f1117;
      color: #e4e6ef;
    }

    body {
      padding: 0;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Header */
    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .header h1 .accent {
      color: #6c5ce7;
    }

    /* Data Source Banner */
    .data-source-banner {
      background-color: #1a1d27;
      border: 1px solid #2e3345;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .data-source-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #6c5ce7;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .data-source-label {
      color: #8b8fa3;
      font-size: 14px;
      font-weight: 500;
    }

    .upload-zone {
      flex: 1;
      min-width: 250px;
      background-color: #232734;
      border: 1px dashed #3a3f55;
      border-radius: 8px;
      padding: 10px 16px;
      color: #8b8fa3;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #6c5ce7;
      background-color: #1e2030;
      color: #e4e6ef;
    }

    .upload-zone.has-data {
      border-style: solid;
      border-color: #00b894;
      color: #e4e6ef;
    }

    .data-source-btn {
      background-color: #6c5ce7;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      flex-shrink: 0;
    }

    .data-source-btn:hover {
      background-color: #5a4cc4;
    }

    .data-source-btn:disabled {
      background-color: #4a4c5e;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .data-source-status {
      font-size: 13px;
      color: #8b8fa3;
      min-width: 100px;
    }

    .data-source-status.success {
      color: #00b894;
    }

    .data-source-status.error {
      color: #e17055;
    }

    .data-source-status.warning {
      color: #fdcb6e;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #4a4c5e;
      border-top-color: #6c5ce7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      background-color: #1a1d27;
      border: 1px solid #2e3345;
      border-radius: 12px;
      padding: 8px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 8px 16px;
      border-radius: 8px;
      background-color: transparent;
      color: #8b8fa3;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab:hover {
      color: #e4e6ef;
    }

    .tab.active {
      background-color: #6c5ce7;
      color: white;
    }

    /* Sections */
    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    /* KPI Row */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .kpi-card {
      background-color: #1a1d27;
      border: 1px solid #2e3345;
      border-radius: 12px;
      padding: 16px;
      position: relative;
      border-top: 3px solid;
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 12px 12px 0 0;
    }

    .kpi-card.green {
      border-top-color: #00b894;
    }

    .kpi-card.green::before {
      background-color: #00b894;
    }

    .kpi-card.amber {
      border-top-color: #fdcb6e;
    }

    .kpi-card.amber::before {
      background-color: #fdcb6e;
    }

    .kpi-card.red {
      border-top-color: #e17055;
    }

    .kpi-card.red::before {
      background-color: #e17055;
    }

    .kpi-label {
      font-size: 12px;
      color: #8b8fa3;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 700;
      color: #e4e6ef;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .kpi-target {
      font-size: 13px;
      color: #8b8fa3;
      margin-top: 4px;
    }

    .kpi-delta {
      font-size: 12px;
      margin-left: auto;
      padding: 4px 8px;
      border-radius: 4px;
      background-color: rgba(108, 92, 231, 0.1);
      color: #6c5ce7;
    }

    .kpi-delta.up {
      color: #00b894;
      background-color: rgba(0, 184, 148, 0.1);
    }

    .kpi-delta.down {
      color: #e17055;
      background-color: rgba(225, 112, 85, 0.1);
    }

    /* Controls */
    .quarterly-controls, .coach-controls, .weekly-controls {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }

    .control-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .control-label {
      font-size: 13px;
      color: #8b8fa3;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select {
      background-color: #1a1d27;
      border: 1px solid #2e3345;
      border-radius: 8px;
      color: #e4e6ef;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: #6c5ce7;
      box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
    }

    select option {
      background-color: #1a1d27;
      color: #e4e6ef;
    }

    .month-filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .month-filter-btn {
      padding: 6px 12px;
      background-color: #232734;
      border: 1px solid #2e3345;
      border-radius: 20px;
      color: #8b8fa3;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .month-filter-btn:hover {
      border-color: #6c5ce7;
      color: #e4e6ef;
    }

    .month-filter-btn.active {
      background-color: #6c5ce7;
      border-color: #6c5ce7;
      color: white;
    }

    .missing-months-notice {
      background-color: rgba(253, 203, 110, 0.1);
      border: 1px solid rgba(253, 203, 110, 0.3);
      border-radius: 8px;
      color: #fdcb6e;
      font-size: 13px;
      padding: 8px 14px;
      margin-bottom: 16px;
    }

    /* Monthly Grid */
    .monthly-grid {
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin-bottom: 32px;
    }

    .month-card {
      background-color: #1a1d27;
      border: 1px solid #2e3345;
      border-radius: 12px;
      padding: 20px;
      position: relative;
    }

    .month-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      border-radius: 12px 0 0 12px;
      background-color: #6c5ce7;
    }

    .month-card.green::before {
      background-color: #00b894;
    }

    .month-card.amber::before {
      background-color: #fdcb6e;
    }

    .month-card.red::before {
      background-color: #e17055;
    }

    .month-title {
      font-size: 16px;
      font-weight: 600;
      color: #e4e6ef;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .month-delta {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      background-color: rgba(108, 92, 231, 0.1);
      color: #6c5ce7;
    }

    .month-delta.up {
      color: #00b894;
      background-color: rgba(0, 184, 148, 0.1);
    }

    .month-delta.down {
      color: #e17055;
      background-color: rgba(225, 112, 85, 0.1);
    }

    .month-stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #232734;
    }

    .month-stat-row:last-of-type {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .month-stat {
      display: flex;
      flex-direction: column;
    }

    .month-stat-label {
      font-size: 11px;
      color: #8b8fa3;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .month-stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #e4e6ef;
    }

    .month-stat-secondary {
      font-size: 12px;
      color: #8b8fa3;
      margin-top: 2px;
    }

    /* Per-month breakdown row (class + coach side by side) */
    .month-breakdowns-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }

    .month-breakdown-box {
      background-color: #232734;
      border: 1px solid #2e3345;
      border-radius: 10px;
      padding: 16px;
    }

    /* Class/Coach Breakdown */
    .month-class-breakdown, .month-coach-breakdown, .weekly-breakdown-content {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .breakdown-title {
      font-size: 12px;
      color: #8b8fa3;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .class-bar-row, .coach-bar-row {
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .class-bar-name, .coach-bar-name {
      width: 140px;
      font-size: 13px;
      color: #e4e6ef;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    .class-bar-track, .coach-bar-track {
      flex: 1;
      height: 24px;
      background-color: #232734;
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      border: 1px solid #2e3345;
    }

    .class-bar-fill, .coach-bar-fill {
      height: 100%;
      background-color: #6c5ce7;
      border-radius: 6px;
      position: relative;
      transition: width 0.3s ease;
    }

    .class-bar-fill.green, .coach-bar-fill.green {
      background-color: #00b894;
    }

    .class-bar-fill.amber, .coach-bar-fill.amber {
      background-color: #fdcb6e;
    }

    .class-bar-fill.red, .coach-bar-fill.red {
      background-color: #e17055;
    }

    .class-bar-target, .coach-bar-target {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background-color: rgba(255, 255, 255, 0.3);
      pointer-events: none;
    }

    .class-bar-count, .coach-bar-count {
      font-size: 12px;
      color: #8b8fa3;
      min-width: 40px;
      text-align: right;
      flex-shrink: 0;
    }

    .coach-detail {
      font-size: 12px;
      color: #8b8fa3;
      min-width: 120px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Charts */
    .chart-container {
      margin-bottom: 32px;
    }

    .chart-wrapper {
      background-color: #1a1d27;
      border: 1px solid #2e3345;
      border-radius: 12px;
      padding: 20px;
    }

    .monthly-chart-wrapper {
      height: 340px;
      position: relative;
    }

    .chart-title {
      font-size: 14px;
      font-weight: 600;
      color: #e4e6ef;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Weekly */
    .weekly-header {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .weekly-breakdown-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .weekly-breakdown-card {
      background-color: #1a1d27;
      border: 1px solid #2e3345;
      border-radius: 12px;
      padding: 20px;
    }

    /* Heat Map */
    table.heatmap {
      width: 100%;
      border-collapse: collapse;
      background-color: #1a1d27;
      border: 1px solid #2e3345;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 32px;
    }

    table.heatmap thead {
      background-color: #232734;
    }

    table.heatmap th, table.heatmap td {
      padding: 12px;
      border: 1px solid #2e3345;
      text-align: center;
      font-size: 12px;
    }

    table.heatmap th {
      color: #8b8fa3;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    table.heatmap td {
      position: relative;
      min-width: 80px;
    }

    .cell-heat {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      border-radius: 6px;
      font-weight: 600;
      min-height: 50px;
      padding: 8px;
    }

    .peak-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 8px;
      height: 8px;
      background-color: #fdcb6e;
      border-radius: 50%;
    }

    .slot-label {
      color: #8b8fa3;
      font-size: 11px;
      padding: 4px 0;
    }

    .slot-label strong {
      display: block;
      color: #e4e6ef;
      font-size: 12px;
      margin-bottom: 2px;
    }

    /* Trends */
    .class-toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .class-toggle {
      padding: 6px 12px;
      background-color: #232734;
      border: 1px solid #2e3345;
      border-radius: 20px;
      color: #8b8fa3;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .class-toggle::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #6c5ce7;
      opacity: 0.3;
      transition: all 0.2s;
    }

    .class-toggle:hover {
      border-color: #6c5ce7;
      color: #e4e6ef;
    }

    .class-toggle.active {
      background-color: rgba(108, 92, 231, 0.2);
      border-color: #6c5ce7;
      color: #6c5ce7;
    }

    .class-toggle.active::before {
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 16px;
      }

      .header h1 {
        font-size: 24px;
      }

      .kpi-row {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      }

      .tabs {
        flex-direction: column;
      }

      .tab {
        width: 100%;
        text-align: left;
      }

      .data-source-banner {
        flex-direction: column;
      }

      .upload-zone {
        width: 100%;
      }

      .quarterly-controls, .coach-controls, .weekly-controls {
        flex-direction: column;
        align-items: stretch;
      }

      .control-group {
        flex-direction: column;
      }

      .control-label {
        display: block;
        margin-bottom: 4px;
      }

      select {
        width: 100%;
      }

      .monthly-grid {
        grid-template-columns: 1fr;
      }

      .weekly-breakdown-grid {
        grid-template-columns: 1fr;
      }

      .month-stat-row {
        grid-template-columns: 1fr;
      }

      table.heatmap {
        font-size: 10px;
        overflow-x: auto;
      }

      table.heatmap th, table.heatmap td {
        padding: 8px;
        min-width: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>Class <span class="accent">Performance</span> Dashboard</h1>
    </div>

    <!-- Data Source Banner -->
    <div class="data-source-banner">
      <div class="data-source-dot" id="dataSourceDot"></div>
      <div class="data-source-label">Data:</div>
      <label class="upload-zone" id="uploadZone" for="csvFileInput">
        <span id="uploadZoneText">Drop WodBoard CSV files here or <u>click to browse</u></span>
        <input type="file" id="csvFileInput" accept=".csv" multiple style="display:none">
      </label>
      <button class="data-source-btn" id="clearDataBtn" style="display:none">Clear</button>
      <div class="data-source-status" id="dataSourceStatus">Showing sample data</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="monthly">Quarterly</button>
      <button class="tab" data-tab="weekly">Weekly</button>
      <button class="tab" data-tab="matrix">Performance Matrix</button>
      <button class="tab" data-tab="trends">Trends</button>
    </div>

    <!-- Tab: Quarterly -->
    <div class="section active" data-tab="monthly">
      <div class="quarterly-controls">
        <div class="control-group">
          <label class="control-label">Quarter:</label>
          <select id="quarterSelect">
            <option value="">Loading...</option>
          </select>
        </div>
      </div>
      <div class="month-filters" id="monthFilters"></div>

      <div class="kpi-row" id="quarterlyKPI"></div>
      <div id="missingMonthsNotice"></div>

      <div class="chart-container">
        <div class="chart-wrapper">
          <div class="chart-title">Monthly Comparison</div>
          <div class="monthly-chart-wrapper">
            <canvas id="quarterlyChart"></canvas>
          </div>
        </div>
      </div>

      <div class="monthly-grid" id="monthlyCardsContainer"></div>
    </div>

    <!-- Tab: Weekly -->
    <div class="section" data-tab="weekly">
      <div class="weekly-header">
        <div class="control-group">
          <label class="control-label">Week:</label>
          <select id="weekSelect">
            <option value="">Loading...</option>
          </select>
        </div>
      </div>

      <div class="kpi-row" id="weeklyKPI"></div>

      <div class="weekly-breakdown-grid" id="weeklyBreakdownContainer"></div>
    </div>

    <!-- Tab: Performance Matrix -->
    <div class="section" data-tab="matrix">
      <div class="chart-container" id="matrixContainer"></div>
    </div>

    <!-- Tab: Trends -->
    <div class="section" data-tab="trends">
      <div class="class-toggles" id="classToggles"></div>
      <div class="chart-container">
        <div class="chart-wrapper">
          <div class="monthly-chart-wrapper">
            <canvas id="trendsChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Supabase client ──────────────────────────────────────────────────────
    const { createClient } = window.supabase;
    const SUPABASE_URL      = 'https://zktmstbndkwnmvxrxvqh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprdG1zdGJuZGt3bm12eHJ4dnFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDE4NzMsImV4cCI6MjA5MTIxNzg3M30.j5OpQRM2AmXDI5O5D1BEELjYVnj6e6zKKgHWGB46Xtg';
    const _db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Date conversion helpers (dashboard uses DD/MM/YYYY, Supabase uses ISO)
    function ddmmyyyyToISO(str) {
      if (!str) return null;
      const parts = str.trim().split(' ');
      const [dd, mm, yyyy] = parts[0].split('/');
      const time = parts[1] || '00:00';
      return `${yyyy}-${mm}-${dd}T${time}:00`;
    }
    function isoToStartTime(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);

    // Constants
    const DAY_ORDER = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const CLASS_COLOURS = ['#6c5ce7', '#00b894', '#e17055', '#74b9ff', '#fdcb6e', '#a29bfe', '#55efc4', '#fab1a0', '#81ecec', '#ffeaa7', '#dfe6e9', '#636e72', '#ff7675', '#fd79a8', '#00cec9'];

    let data = [];
    let currentTab = 'monthly';
    let quarterlyState = { quarter: '', months: new Set() };
    let weeklyState = { week: '' };
    let charts = {};

    // Helpers
    function parseDate(dateStr) {
      const [day, month, year] = dateStr.split('/').map(Number);
      return new Date(year, month - 1, day);
    }

    function getMonthKey(row) {
      const date = parseDate(row.Week_Start);
      const month = String(date.getMonth() + 1).padStart(2, '0');
      return `${date.getFullYear()}-${month}`;
    }

    function getMonthsInQuarter(quarterStr) {
      const [year, q] = quarterStr.split('-Q').map(s => parseInt(s));
      const months = [];
      const startMonth = (parseInt(q) - 1) * 3;
      for (let i = 0; i < 3; i++) {
        const m = startMonth + i;
        const month = String(m + 1).padStart(2, '0');
        months.push(`${year}-${month}`);
      }
      return months;
    }

    function kpiColor(val, target) {
      if (val >= target) return 'green';
      if (val >= target - 10) return 'amber';
      return 'red';
    }

    function heatColor(pct) {
      if (pct < 50) {
        const ratio = pct / 50;
        const b = Math.round(220);
        const g = Math.round(185 + (203 - 185) * ratio);
        const r = Math.round(116 + (253 - 116) * ratio);
        return `rgba(${r}, ${g}, ${b}, 0.8)`;
      } else {
        const ratio = (pct - 50) / 50;
        const r = Math.round(253 + (225 - 253) * ratio);
        const g = Math.round(203 - (203 - 112) * ratio);
        const b = Math.round(110 - 110 * ratio);
        return `rgba(${r}, ${g}, ${b}, 0.8)`;
      }
    }

    // ── CSV Processing (mirrors the Apps Script logic) ──────────────────────
    const EXCLUDE_CLASSES = ['Gym Time', 'Private Event', 'FCS Thursday Throwdown'];

    function csvGetWeekStart(startTime) {
      if (!startTime) return '';
      const datePart = startTime.split(' ')[0];
      const parts = datePart.split('/');
      if (parts.length < 3) return '';
      const d = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      return `${dd}/${mm}/${d.getFullYear()}`;
    }

    function csvCheckIsPeak(startTime) {
      if (!startTime) return false;
      const timePart = startTime.split(' ')[1];
      if (!timePart) return false;
      const [h, m] = timePart.split(':').map(Number);
      const mins = h * 60 + m;
      return (mins >= 360 && mins <= 540) || (mins >= 1050 && mins <= 1200);
    }

    function csvGetDayName(startTime) {
      if (!startTime) return '';
      const datePart = startTime.split(' ')[0];
      const parts = datePart.split('/');
      if (parts.length < 3) return '';
      const d = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
      return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][d.getDay()];
    }

    function processRawRows(rows) {
      const results = [];
      for (const r of rows) {
        const className = (r['Class'] || '').trim();
        if (!className || EXCLUDE_CLASSES.includes(className)) continue;
        const startTime = (r['Start time'] || '').trim();
        if (!startTime) continue;
        const staff1    = (r['First staff member']  || '').trim();
        const staff2    = (r['Second staff member'] || '').trim();
        const staff3    = (r['Third staff member']  || '').trim();
        const capacity  = parseInt(r['Capacity'])  || 0;
        const bookings  = parseInt(r['Bookings'])  || 0;
        const attendance = (r['Attendance'] || '').trim();
        const cancelled = parseInt(r['Cancelled']) || 0;

        const weekStart    = csvGetWeekStart(startTime);
        let attPct = 0;
        if (attendance && attendance !== '-') {
          attPct = parseFloat(attendance.replace('%', '')) || 0;
        }
        const bookingRate  = capacity > 0 ? parseFloat(((bookings / capacity) * 100).toFixed(1)) : 0;
        const isPeak       = csvCheckIsPeak(startTime);
        const coaches      = [staff1, staff2, staff3].filter(s => s !== '');
        const coachLabel   = coaches.length > 0 ? coaches.join(' + ') : 'Unassigned';
        const dayName      = csvGetDayName(startTime);
        const timeStr      = startTime.split(' ')[1] || '';

        results.push({
          Class: className,
          'Start time': startTime,
          Capacity: capacity,
          Bookings: bookings,
          Cancelled: cancelled,
          Week_Start: weekStart,
          Attendance_Pct: attPct,
          Booking_Rate: bookingRate,
          Is_Peak: isPeak,
          Coach_Label: coachLabel,
          Day_Name: dayName,
          Time_Str: timeStr,
          Day_Time: `${dayName} ${timeStr}`
        });
      }
      return results;
    }

    function isRawFormat(headers) {
      return headers.includes('First staff member');
    }

    function parseCSVFile(file) {
      return new Promise((resolve, reject) => {
        Papa.parse(file, {
          header: true,
          skipEmptyLines: true,
          worker: false,  // avoid worker thread conflicts when parsing many files sequentially
          complete: resolve,
          error: reject
        });
      });
    }

    // ── Supabase storage helpers ─────────────────────────────────────────────
    async function saveDataToStorage(dataArray) {
      try {
        const rows = dataArray.map(r => ({
          class_name:     r.Class,
          start_time:     ddmmyyyyToISO(r['Start time']),
          capacity:       r.Capacity,
          bookings:       r.Bookings,
          cancelled:      r.Cancelled      || 0,
          week_start:     ddmmyyyyToISO(r.Week_Start).split('T')[0],
          attendance_pct: r.Attendance_Pct || 0,
          booking_rate:   r.Booking_Rate   || 0,
          is_peak:        r.Is_Peak        || false,
          coach_label:    r.Coach_Label    || 'Unassigned',
          day_name:       r.Day_Name       || '',
          time_str:       r.Time_Str       || '',
          day_time:       r.Day_Time       || ''
        }));
        const { error } = await _db
          .from('class_performance')
          .upsert(rows, { onConflict: 'class_name,start_time,week_start' });
        if (error) throw error;
        return true;
      } catch(e) {
        console.warn('Supabase save failed:', e.message);
        return false;
      }
    }

    async function loadDataFromStorage() {
      try {
        // Paginate in batches of 1000 to bypass Supabase's default row cap
        const PAGE = 1000;
        let allRecords = [];
        let from = 0;
        while (true) {
          const { data: records, error } = await _db
            .from('class_performance')
            .select('*')
            .order('week_start', { ascending: true })
            .range(from, from + PAGE - 1);
          if (error) throw error;
          if (!records || records.length === 0) break;
          allRecords = allRecords.concat(records);
          if (records.length < PAGE) break; // last page
          from += PAGE;
        }
        if (allRecords.length === 0) return null;
        return allRecords.map(r => ({
          Class:          r.class_name,
          'Start time':   isoToStartTime(r.start_time),
          Capacity:       r.capacity,
          Bookings:       r.bookings,
          Cancelled:      r.cancelled,
          Week_Start:     isoToWeekStart(r.week_start),
          Attendance_Pct: r.attendance_pct,
          Booking_Rate:   r.booking_rate,
          Is_Peak:        r.is_peak,
          Coach_Label:    r.coach_label,
          Day_Name:       r.day_name,
          Time_Str:       r.time_str,
          Day_Time:       r.day_time
        }));
      } catch(e) { return null; }
    }

    function clearStorage() {
      // Data is stored permanently in Supabase — clears local view only
    }

    async function storageSavedDate() {
      try {
        const { data: uploads, error } = await _db
          .from('csv_uploads')
          .select('created_at')
          .order('created_at', { ascending: false })
          .limit(1);
        if (error || !uploads || uploads.length === 0) return null;
        return new Date(uploads[0].created_at);
      } catch(e) { return null; }
    }

    // ── File upload handler ──────────────────────────────────────────────────
    async function handleFiles(files) {
      if (!files || files.length === 0) return;
      // Snapshot FileList into a plain array immediately so input resets don't affect it
      const fileArray = Array.from(files);
      const total = fileArray.length;
      updateStatus('', '');

      let newRows = [];
      const errors = [];

      for (let i = 0; i < fileArray.length; i++) {
        const file = fileArray[i];
        document.getElementById('uploadZoneText').textContent =
          total > 1 ? `Processing file ${i + 1} of ${total}: ${file.name}…` : 'Processing…';
        try {
          const results = await parseCSVFile(file);
          const headers = results.meta.fields || [];
          let rows;
          if (isRawFormat(headers)) {
            rows = processRawRows(results.data);
          } else {
            // Pre-processed master-sheet format
            rows = results.data.filter(r => r.Class).map(r => ({
              Class: r.Class,
              'Start time': r['Start time'],
              Capacity:       parseInt(r.Capacity)       || 0,
              Bookings:       parseInt(r.Bookings)       || 0,
              Cancelled:      parseInt(r.Cancelled)      || 0,
              Week_Start:     r.Week_Start,
              Attendance_Pct: parseFloat(r.Attendance_Pct) || 0,
              Booking_Rate:   parseFloat(r.Booking_Rate)   || 0,
              Is_Peak:        r.Is_Peak === 'TRUE' || r.Is_Peak === 'true' || r.Is_Peak === true,
              Coach_Label:    r.Coach_Label || 'Unassigned',
              Day_Name:       r.Day_Name   || csvGetDayName(r['Start time']),
              Time_Str:       r.Time_Str   || (r['Start time'] || '').split(' ')[1] || '',
              Day_Time:       r.Day_Time   || ''
            }));
          }
          newRows = newRows.concat(rows);
        } catch (e) {
          errors.push(file.name + ': ' + e.message);
        }
      }

      if (newRows.length === 0) {
        document.getElementById('uploadZoneText').innerHTML = 'Drop WodBoard CSV files here or <u>click to browse</u>';
        updateStatus('error', errors.length ? errors[0] : 'No valid data found');
        return;
      }

      // Merge with any existing uploaded data (not sample data), then deduplicate
      const existing = (data !== EMBEDDED_DATA && data.length > 0) ? data : [];
      const combined = [...existing, ...newRows];
      const seen = new Set();
      const deduped = combined.filter(r => {
        const key = r.Class + '|' + r['Start time'];
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });

      data = deduped.sort((a, b) => parseDate(a.Week_Start) - parseDate(b.Week_Start));

      // Persist to Supabase — only upsert the new rows (Supabase handles dedup)
      document.getElementById('uploadZoneText').textContent = 'Saving to Supabase…';
      const saved = await saveDataToStorage(newRows);

      // Re-fetch from Supabase to get the authoritative full dataset
      // (avoids race condition where initData hadn't finished loading before upload)
      if (saved) {
        document.getElementById('uploadZoneText').textContent = 'Refreshing from Supabase…';
        const refreshed = await loadDataFromStorage();
        if (refreshed) data = refreshed;
      }

      const zone = document.getElementById('uploadZone');
      zone.classList.add('has-data');
      document.getElementById('uploadZoneText').textContent =
        `✓ ${data.length.toLocaleString()} records${saved ? ' · saved to Supabase' : ''}`;
      document.getElementById('clearDataBtn').style.display = '';

      populateSelects();
      renderCurrentTab();
      const successCount = total - errors.length;
      const statusMsg = total > 1
        ? `${data.length.toLocaleString()} records from ${successCount} of ${total} files`
        : `${data.length.toLocaleString()} records`;
      updateStatus('success', statusMsg);
      if (errors.length) {
        console.warn('File errors:', errors);
        updateStatus('error', `${errors.length} file(s) failed: ${errors[0]}`);
      }
    }

    function parseRow(row) {
      if (typeof row === 'string') {
        return JSON.parse(row);
      }
      return row;
    }

    function formatPct(val) {
      return typeof val === 'number' ? val.toFixed(1) + '%' : val;
    }

    // Capacity-weighted booking rate: total bookings ÷ total capacity × 100
    function wbr(rows) {
      const totalBookings = rows.reduce((s, r) => s + r.Bookings, 0);
      const totalCapacity = rows.reduce((s, r) => s + r.Capacity, 0);
      return totalCapacity > 0 ? (totalBookings / totalCapacity) * 100 : 0;
    }

    // Data initialisation — load from Supabase, or fall back to sample
    async function initData() {
      updateStatus('', 'Loading from Supabase…');
      const stored = await loadDataFromStorage();
      if (stored) {
        data = stored;
        const savedDate = await storageSavedDate();
        const dateStr = savedDate
          ? savedDate.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
          : '';
        const zone = document.getElementById('uploadZone');
        zone.classList.add('has-data');
        document.getElementById('uploadZoneText').textContent =
          `✓ ${data.length.toLocaleString()} records · last upload ${dateStr}`;
        document.getElementById('clearDataBtn').style.display = '';
        populateSelects();
        renderCurrentTab();
        updateStatus('success', `${data.length.toLocaleString()} records loaded from Supabase`);
      } else if (EMBEDDED_DATA && Array.isArray(EMBEDDED_DATA) && EMBEDDED_DATA.length > 0) {
        data = EMBEDDED_DATA;
        populateSelects();
        renderCurrentTab();
        updateStatus('', 'Showing sample data — upload CSV files to load your own');
      }
    }

    function updateStatus(type, msg) {
      const status = document.getElementById('dataSourceStatus');
      status.className = 'data-source-status ' + type;
      status.textContent = msg;
    }

    function populateSelects() {
      const quarters = [...new Set(data.map(row => {
        const date = parseDate(row.Week_Start);
        const q = Math.floor(date.getMonth() / 3) + 1;
        return `${date.getFullYear()}-Q${q}`;
      }))].sort();

      [document.getElementById('quarterSelect')].forEach(sel => {
        sel.innerHTML = quarters.map(q => `<option value="${q}">${q}</option>`).join('');
      });

      const weeks = [...new Set(data.map(row => row.Week_Start))].sort((a, b) => parseDate(a) - parseDate(b));
      document.getElementById('weekSelect').innerHTML = weeks.map(w => `<option value="${w}">${w}</option>`).join('');

      if (quarters.length > 0) quarterlyState.quarter = quarters[quarters.length - 1];
      if (weeks.length > 0) weeklyState.week = weeks[weeks.length - 1];

      updateMonthFilters();
    }

    function updateMonthFilters() {
      if (!quarterlyState.quarter) return;
      const months = getMonthsInQuarter(quarterlyState.quarter);
      const container = document.getElementById('monthFilters');
      container.innerHTML = months.map((m, i) => {
        const label = MONTH_NAMES[parseInt(m.split('-')[1]) - 1] + ' ' + m.split('-')[0];
        return `<button class="month-filter-btn ${quarterlyState.months.size === 0 || quarterlyState.months.has(m) ? 'active' : ''}" data-month="${m}">${label}</button>`;
      }).join('');

      if (quarterlyState.months.size === 0) {
        quarterlyState.months = new Set(months);
      }

      container.querySelectorAll('.month-filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const month = e.target.dataset.month;
          if (e.target.classList.contains('active')) {
            e.target.classList.remove('active');
            quarterlyState.months.delete(month);
          } else {
            e.target.classList.add('active');
            quarterlyState.months.add(month);
          }
          renderMonthly();
        });
      });
    }

    function getFilteredData(months) {
      return data.filter(row => months.has(getMonthKey(row)));
    }

    function renderCurrentTab() {
      switch(currentTab) {
        case 'monthly': renderMonthly(); break;
        case 'weekly': renderWeekly(); break;
        case 'matrix': renderMatrix(); break;
        case 'trends': renderTrends(); break;
      }
    }

    function renderMonthly() {
      const filtered = getFilteredData(quarterlyState.months);

      const peakData = filtered.filter(r => r.Is_Peak);
      const avgPeakBooking = wbr(peakData);
      const totalSessions = filtered.length;

      const kpiHtml = `
        <div class="kpi-card ${kpiColor(avgBooking, 70)}">
          <div class="kpi-label">Avg Booking Rate</div>
          <div class="kpi-value">${formatPct(avgBooking)}</div>

        </div>
        <div class="kpi-card ${kpiColor(avgAttendance, 70)}">
          <div class="kpi-label">Avg Attendance %</div>

      const dataMonths = new Set(data.map(r => getMonthKey(r)));
      const missingMonths = expectedMonths.filter(m => !dataMonths.has(m));
      const missingWarning = missingMonths.length > 0
        ? `<div class="missing-months-notice">⚠ No data for ${missingMonths.map(m => {
            const [y, mo] = m.split('-');
            return MONTH_NAMES[parseInt(mo) - 1] + ' ' + y;

        : '';
      document.getElementById('missingMonthsNotice').innerHTML = missingWarning;

      renderQuarterlyChart(filtered);

    function renderQuarterlyChart(filtered) {
      const allMonths = [...new Set(data.map(r => getMonthKey(r)))].sort();
      const labels = allMonths.map(m => {
        const [year, month] = m.split('-');
        return MONTH_NAMES[parseInt(month) - 1].substring(0, 3) + ' ' + year;
      });

      const bookingByMonth = allMonths.map(m => {
        const rows = data.filter(r => getMonthKey(r) === m);
        return rows.length > 0 ? (wbr(rows)) : 0;
      });

      const attendanceByMonth = allMonths.map(m => {
        const rows = data.filter(r => getMonthKey(r) === m);
        return rows.length > 0 ? (rows.reduce((s, r) => s + r.Attendance_Pct, 0) / rows.length) : 0;
      });

      if (charts.quarterly) charts.quarterly.destroy();

      const ctx = document.getElementById('quarterlyChart').getContext('2d');
      charts.quarterly = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Booking Rate',
              data: bookingByMonth,
              backgroundColor: '#6c5ce7',
              borderColor: '#6c5ce7',
              borderWidth: 2,
              borderRadius: 4

            {
              label: 'Attendance %',

              backgroundColor: 'rgba(116, 185, 255, 0.5)',

              borderRadius: 4

    function renderMonthlyCards(filtered) {
      const months = [...quarterlyState.months].sort();
      const allMonths = [...new Set(data.map(r => getMonthKey(r)))].sort();

      let html = '';
      months.forEach(monthKey => {
        const rows = filtered.filter(r => getMonthKey(r) === monthKey);
        const [year, month] = monthKey.split('-');
        const monthName = MONTH_NAMES[parseInt(month) - 1];
        const title = `${monthName} ${year}`;

        const monthIndex = allMonths.indexOf(monthKey);
        let deltaHtml = '';
        if (monthIndex > 0) {
          const prevRows = data.filter(r => getMonthKey(r) === allMonths[monthIndex - 1]);
          const prevAvg = wbr(prevRows);
          const currAvg = wbr(rows);
          const delta = currAvg - prevAvg;
          const sign = delta >= 0 ? '+' : '';
          const className = delta >= 0 ? 'up' : 'down';
          deltaHtml = `<span class="month-delta ${className}">${sign}${delta.toFixed(1)}pp</span>`;
        }

        const avgBooking = wbr(rows);
        const avgAttendance = rows.reduce((s, r) => s + r.Attendance_Pct, 0) / rows.length || 0;
        const peakRows = rows.filter(r => r.Is_Peak);
        const avgPeakBooking = wbr(peakRows);
        const totalBookings = rows.reduce((s, r) => s + r.Bookings, 0);
        const totalCancellations = rows.reduce((s, r) => s + r.Cancelled, 0);

        const cardClass = kpiColor(avgBooking, 70);

        const classByName = {};
        rows.forEach(r => {
          if (!classByName[r.Class]) classByName[r.Class] = [];
          classByName[r.Class].push(r);
        });
        const classBreakdown = Object.entries(classByName)
          .map(([name, rows]) => {
            const avg = wbr(rows);
            return { name, avg, count: rows.length };
          })
          .sort((a, b) => b.avg - a.avg);

        let classHtml = classBreakdown.map(c => {
          const fillColor = kpiColor(c.avg, 70);

              <div class="class-bar-count">n=${c.count}</div>

        html += `
          <div class="month-card ${cardClass}">
            <div class="month-title">${title} ${deltaHtml}</div>
            <div class="month-stat-row">
              <div class="month-stat">
                <div class="month-stat-label">Avg Booking Rate</div>

            <div class="month-stat-row">

            <div class="month-stat-row">
              <div class="month-stat">
                <div class="month-stat-label">Total Bookings</div>
                <div class="month-stat-value">${totalBookings}</div>
              </div>
              <div class="month-stat">

        </div>
        <div class="weekly-breakdown-card">
          <div class="breakdown-title">Coach Breakdown</div>
          ${coachHtml}
        </div>
      `;

      document.getElementById('weeklyBreakdownContainer').innerHTML = `<div class="weekly-breakdown-grid">${html}</div>`;
    }

    function renderMatrix() {
      const week = weeklyState.week;
      const filtered = data.filter(r => r.Week_Start === week);
      
      const classes = [...new Set(filtered.map(r => r.Class))].sort((a, b) => {
        const avgA = wbr(filtered.filter(r => r.Class === a));
        const avgB = wbr(filtered.filter(r => r.Class === b));
        return avgB - avgA;
      });
      let html = '';

      classes.forEach(className => {
        const classData = filtered.filter(r => r.Class === className);
        const coaches = [...new Set(classData.map(r => r.Coach_Label))];
        const slots = [...new Set(classData.map(r => r.Day_Time))];
        
        slots.sort((a, b) => {
          const aDayIdx = DAY_ORDER.indexOf(a.split(' ')[0]);
          const bDayIdx = DAY_ORDER.indexOf(b.split(' ')[0]);
          if (aDayIdx !== bDayIdx) return aDayIdx - bDayIdx;
          return a.localeCompare(b);
        });

        const avgBooking = wbr(classData);

        let tableHtml = `
          <div class="chart-wrapper">
            <div class="chart-title">${className} - ${formatPct(avgBooking)} avg (${classData.length} sessions)</div>
            <table class="heatmap">
              <thead>
                <tr>
                  <th>Day / Time</th>
                  ${coaches.map(c => `<th>${c}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
        `;

        slots.forEach(slot => {
          tableHtml += `<tr><td>${slot}</td>`;
          coaches.forEach(coach => {
            const slotData = classData.filter(r => r.Day_Time === slot && r.Coach_Label === coach);
            if (slotData.length > 0) {
              const avg = wbr(slotData);
              const isPeak = slotData[0].Is_Peak;
              const color = heatColor(avg);
              tableHtml += `
                <td>
                  <div class="cell-heat" style="background-color: ${color}">
                    ${isPeak ? '<div class="peak-badge"></div>' : ''}
                    <div class="slot-label"><strong>${avg.toFixed(1)}%</strong>n=${slotData.length}</div>
                  </div>
                </td>
              `;
            } else {
              tableHtml += '<td></td>';
            }
          });
          tableHtml += '</tr>';
        });

        tableHtml += `
              </tbody>
            </table>
          </div>
        `;
        html += tableHtml;
      });

      document.getElementById('matrixContainer').innerHTML = html;
    }

    function renderTrends() {
      const classes = [...new Set(data.map(r => r.Class))];
      const weeks = [...new Set(data.map(r => r.Week_Start))].sort();

      let toggleHtml = classes.map((c, idx) => `
        <button class="class-toggle" data-class="${c}" style="--color: ${CLASS_COLOURS[idx % CLASS_COLOURS.length]}">
          <span style="background-color: ${CLASS_COLOURS[idx % CLASS_COLOURS.length]}"></span> ${c}
        </button>
      `).join('');
      document.getElementById('classToggles').innerHTML = toggleHtml;

      const toggles = document.querySelectorAll('.class-toggle');
      toggles.forEach(btn => {
        btn.addEventListener('click', () => {
          btn.classList.toggle('active');
          updateTrendsChart();
        });
      });

      updateTrendsChart();

      function updateTrendsChart() {
        const activeClasses = [...new Map(
          [...document.querySelectorAll('.class-toggle.active')].map(btn => [btn.dataset.class, btn])
        ).keys()];

        const datasets = activeClasses.map((cls, idx) => {
          const chartData = weeks.map(w => {
            const rows = data.filter(r => r.Week_Start === w && r.Class === cls);
            return rows.length > 0 ? (wbr(rows)) : null;
          });
          return {
            label: cls,
            data: chartData,
            borderColor: CLASS_COLOURS[classes.indexOf(cls) % CLASS_COLOURS.length],
            backgroundColor: CLASS_COLOURS[classes.indexOf(cls) % CLASS_COLOURS.length] + '33',
            tension: 0.3,
            borderWidth: 2,
            spanGaps: true
          };
        });

        if (charts.trends) charts.trends.destroy();

        const ctx = document.getElementById('trendsChart').getContext('2d');
        charts.trends = new Chart(ctx, {
          type: 'line',
          data: {
            labels: weeks.map(w => {
              const date = parseDate(w);
              return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }),
            datasets: datasets
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { labels: { color: '#8b8fa3' } }
            },
            scales: {
              y: {
                beginAtZero: true,
                max: 100,
                ticks: { color: '#8b8fa3' },
                grid: { color: '#232734' }
              },
              x: { ticks: { color: '#8b8fa3' }, grid: { color: '#232734' } }
            }
          }
        });
      }
    }

    // ── File upload handlers ─────────────────────────────────────────────────
    document.getElementById('csvFileInput').addEventListener('change', (e) => {
      handleFiles(e.target.files);
      e.target.value = ''; // reset so the same file can be re-uploaded if needed
    });

    const _uploadZone = document.getElementById('uploadZone');
    _uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      _uploadZone.classList.add('drag-over');
    });
    _uploadZone.addEventListener('dragleave', () => {
      _uploadZone.classList.remove('drag-over');
    });
    _uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      _uploadZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });

    document.getElementById('clearDataBtn').addEventListener('click', (e) => {
      e.preventDefault();
      clearStorage();
      data = EMBEDDED_DATA;
      const zone = document.getElementById('uploadZone');
      zone.classList.remove('has-data');
      document.getElementById('uploadZoneText').innerHTML = 'Drop WodBoard CSV files here or <u>click to browse</u>';
      document.getElementById('clearDataBtn').style.display = 'none';
      populateSelects();
      renderCurrentTab();
      updateStatus('', 'Showing sample data — upload CSV files to load your own');
    });

    document.getElementById('quarterSelect').addEventListener('change', (e) => {
      quarterlyState.quarter = e.target.value;
      quarterlyState.months.clear();
      updateMonthFilters();
      renderMonthly();
    });

    document.getElementById('weekSelect').addEventListener('change', (e) => {
      weeklyState.week = e.target.value;
      renderWeekly();
      renderMatrix();
    });

    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        e.target.classList.add('active');
        currentTab = e.target.dataset.tab;
        document.querySelector(`.section[data-tab="${currentTab}"]`).classList.add('active');
        renderCurrentTab();
      });
    });

    initData();
  </script>
</body>
</html>

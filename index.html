<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Performance Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.0/+esm"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0f1117;
      color: #e4e6ef;
    }

    body {
      padding: 0;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Header */
    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .header h1 .accent {
      color: #6c5ce7;
    }

    /* Data Source Banner */
    .data-source-banner {
      background-color: #1a1d27;
      border: 1px solid #2e3345;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .data-source-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #6c5ce7;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    .data-source-dot.loading {
      background-color: #fdcb6e;
    }

    .data-source-dot.error {
      background-color: #e17055;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .data-source-label {
      color: #8b8fa3;
      font-size: 14px;
      font-weight: 500;
    }

    .upload-zone {
      flex: 1;
      min-width: 250px;
      background-color: #232734;
      border: 1px dashed #3a3f55;
      border-radius: 8px;
      padding: 10px 16px;
      color: #8b8fa3;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #6c5ce7;
      background-color: #1e2030;
      color: #e4e6ef;
    }

    .upload-zone.has-data {
      border-style: solid;
      border-color: #00b894;
      color: #e4e6ef;
    }

    .data-source-btn {
      background-color: #6c5ce7;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      flex-shrink: 0;
    }

    .data-source-btn:hover {
      background-color: #5a4cc4;
    }

    .data-source-btn:disabled {
      background-color: #4a4c5e;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .data-source-status {
      font-size: 13px;
      color: #8b8fa3;
      min-width: 100px;
    }

    .data-source-status.success {
      color: #00b894;
    }

    .data-source-status.error {
      color: #e17055;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      border-bottom: 1px solid #2e3345;
    }

    .tab {
      padding: 12px 16px;
      background: none;
      border: none;
      color: #8b8fa3;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab:hover {
      color: #e4e6ef;
    }

    .tab.active {
      color: #6c5ce7;
      border-bottom-color: #6c5ce7;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    /* KPI Row */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .kpi-card {
      background-color: #1a1d27;
      border: 1px solid #2e3345;
      border-radius: 12px;
      padding: 20px;
    }

    .kpi-label {
      font-size: 11px;
      color: #8b8fa3;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 700;
      color: #e4e6ef;
      margin-bottom: 8px;
    }

    .kpi-subtitle {
      font-size: 12px;
      color: #8b8fa3;
    }

    /* Monthly Grid */
    .monthly-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .month-card {
      background-color: #1a1d27;
      border: 1px solid #2e3345;
      border-radius: 12px;
      padding: 20px;
      position: relative;
    }

    .month-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      border-radius: 12px 0 0 12px;
      background-color: #6c5ce7;
    }

    .month-card.green::before {
      background-color: #00b894;
    }

    .month-card.amber::before {
      background-color: #fdcb6e;
    }

    .month-card.red::before {
      background-color: #e17055;
    }

    .month-title {
      font-size: 16px;
      font-weight: 600;
      color: #e4e6ef;
      margin-bottom: 16px;
    }

    .month-stat {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #232734;
      font-size: 13px;
    }

    .month-stat:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .month-stat-label {
      color: #8b8fa3;
    }

    .month-stat-value {
      color: #e4e6ef;
      font-weight: 600;
    }

    /* Chart */
    .chart-container {
      background-color: #1a1d27;
      border: 1px solid #2e3345;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 32px;
    }

    .chart-title {
      font-size: 14px;
      font-weight: 600;
      color: #e4e6ef;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .chart-wrapper {
      position: relative;
      height: 340px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 16px;
      }

      .header h1 {
        font-size: 24px;
      }

      .kpi-row {
        grid-template-columns: 1fr;
      }

      .tabs {
        flex-direction: column;
      }

      .data-source-banner {
        flex-direction: column;
      }

      .upload-zone {
        width: 100%;
      }

      .monthly-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>Class <span class="accent">Performance</span> Dashboard</h1>
    </div>

    <!-- Data Source Banner -->
    <div class="data-source-banner">
      <div class="data-source-dot" id="dataSourceDot"></div>
      <div class="data-source-label">Data:</div>
      <label class="upload-zone" id="uploadZone" for="csvFileInput">
        <span id="uploadZoneText">Drop CSV files here or <u>click to browse</u></span>
        <input type="file" id="csvFileInput" accept=".csv" style="display:none">
      </label>
      <div class="data-source-status" id="dataSourceStatus">Loading...</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="monthly">Overview</button>
      <button class="tab" data-tab="details">Details</button>
    </div>

    <!-- Tab: Monthly Overview -->
    <div class="section active" data-tab="monthly">
      <div class="kpi-row" id="kpiRow"></div>
      <div class="chart-container">
        <div class="chart-title">Weekly Average Attendance</div>
        <div class="chart-wrapper">
          <canvas id="mainChart"></canvas>
        </div>
      </div>
      <div class="monthly-grid" id="monthlyGrid"></div>
    </div>

    <!-- Tab: Details -->
    <div class="section" data-tab="details">
      <p style="color: #8b8fa3; text-align: center; padding: 40px;">
        Details view coming soon. For now, upload new CSVs using the upload zone above.
      </p>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.0/+esm';

    // ========================================================================
    // CONFIGURATION
    // ========================================================================

    const SUPABASE_URL = 'https://zktmstbndkwnmvxrxvqh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprdG1zdGJuZGt3bm12eHJ4dnFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDE4NzMsImV4cCI6MjA5MTIxNzg3M30.j5OpQRM2AmXDI5O5D1BEELjYVnj6e6zKKgHWGB46Xtg';
    const PROCESSOR_URL = process.env.NODE_ENV === 'production'
      ? 'https://your-deployed-processor-url.com' // Update after deployment
      : 'http://localhost:3000';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let data = [];
    let chart = null;

    // ========================================================================
    // STATE MANAGEMENT
    // ========================================================================

    function updateDot(status) {
      const dot = document.getElementById('dataSourceDot');
      dot.classList.remove('loading', 'error');
      if (status === 'loading') dot.classList.add('loading');
      if (status === 'error') dot.classList.add('error');
    }

    function updateStatus(status, message) {
      const el = document.getElementById('dataSourceStatus');
      el.className = `data-source-status ${status}`;
      el.textContent = message;
    }

    // ========================================================================
    // FETCH DATA FROM SUPABASE
    // ========================================================================

    async function fetchDataFromSupabase() {
      try {
        updateDot('loading');
        updateStatus('', 'Loading data...');

        const { data: records, error } = await supabase
          .from('class_performance')
          .select('*')
          .order('week_start', { ascending: true });

        if (error) throw error;

        data = records || [];

        updateDot('success');
        updateStatus('success', `${data.length.toLocaleString()} records from Supabase`);

        // Re-render dashboard
        renderDashboard();

      } catch (error) {
        console.error('Error fetching data:', error);
        updateDot('error');
        updateStatus('error', 'Failed to load data');
      }
    }

    // ========================================================================
    // CSV UPLOAD HANDLER
    // ========================================================================

    document.getElementById('csvFileInput').addEventListener('change', handleFileSelect);

    const uploadZone = document.getElementById('uploadZone');
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('drag-over');
    });
    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('drag-over');
    });
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      handleFiles(files);
    });

    async function handleFileSelect(event) {
      const files = event.target.files;
      if (files.length > 0) {
        await handleFiles(files);
      }
    }

    async function handleFiles(files) {
      if (!files || files.length === 0) return;

      const zone = document.getElementById('uploadZone');
      zone.classList.add('drag-over');
      updateDot('loading');
      updateStatus('', 'Processing upload...');

      try {
        for (const file of files) {
          const formData = new FormData();
          formData.append('file', file);

          const response = await fetch(`${PROCESSOR_URL}/api/upload-csv`, {
            method: 'POST',
            body: formData
          });

          if (!response.ok) {
            throw new Error(`Upload failed: ${response.statusText}`);
          }

          const result = await response.json();
          console.log('Upload result:', result);

          updateStatus('success', `✓ ${result.records_inserted} records inserted from ${file.name}`);
        }

        // Refresh data from Supabase
        await fetchDataFromSupabase();

      } catch (error) {
        console.error('Error uploading file:', error);
        updateDot('error');
        updateStatus('error', `Upload failed: ${error.message}`);
      } finally {
        zone.classList.remove('drag-over');
        document.getElementById('csvFileInput').value = '';
      }
    }

    // ========================================================================
    // DASHBOARD RENDERING
    // ========================================================================

    function getWeekKey(weekStartStr) {
      // weekStartStr format: "DD/MM/YYYY"
      const parts = weekStartStr.split('/');
      if (parts.length !== 3) return '';
      const dateObj = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
      const year = dateObj.getFullYear();
      const week = getWeekNumber(dateObj);
      return `${year}-W${String(week).padStart(2, '0')}`;
    }

    function getWeekNumber(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    }

    function aggregateByWeek(records) {
      const weeks = {};
      for (const r of records) {
        const weekKey = getWeekKey(r.week_start);
        if (!weekKey) continue;

        if (!weeks[weekKey]) {
          weeks[weekKey] = {
            week_start: r.week_start,
            records: []
          };
        }
        weeks[weekKey].records.push(r);
      }

      const result = Object.values(weeks).map(w => {
        const records = w.records;
        const totalBookings = records.reduce((s, r) => s + r.bookings, 0);
        const totalCapacity = records.reduce((s, r) => s + r.capacity, 0);
        const avgAttendance = records.length > 0
          ? records.reduce((s, r) => s + r.attendance_pct, 0) / records.length
          : 0;

        return {
          week: getWeekKey(w.week_start),
          week_start: w.week_start,
          num_classes: records.length,
          avg_attendance: parseFloat(avgAttendance.toFixed(1)),
          booking_rate: totalCapacity > 0 ? parseFloat(((totalBookings / totalCapacity) * 100).toFixed(1)) : 0
        };
      });

      return result.sort((a, b) => new Date(a.week_start.split('/').reverse().join('-')) - new Date(b.week_start.split('/').reverse().join('-')));
    }

    function renderDashboard() {
      if (data.length === 0) {
        document.getElementById('kpiRow').innerHTML = '<p style="color: #8b8fa3;">No data yet. Upload a CSV to get started.</p>';
        return;
      }

      // Aggregate data by week
      const weeks = aggregateByWeek(data);

      // KPIs
      const avgAttendance = weeks.length > 0
        ? (weeks.reduce((s, w) => s + w.avg_attendance, 0) / weeks.length).toFixed(1)
        : 0;
      const avgBookingRate = weeks.length > 0
        ? (weeks.reduce((s, w) => s + w.booking_rate, 0) / weeks.length).toFixed(1)
        : 0;
      const totalClasses = data.length;

      document.getElementById('kpiRow').innerHTML = `
        <div class="kpi-card">
          <div class="kpi-label">Total Classes</div>
          <div class="kpi-value">${totalClasses}</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Avg Attendance %</div>
          <div class="kpi-value">${avgAttendance}%</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Avg Booking Rate</div>
          <div class="kpi-value">${avgBookingRate}%</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Weeks of Data</div>
          <div class="kpi-value">${weeks.length}</div>
        </div>
      `;

      // Chart
      renderChart(weeks);

      // Monthly cards
      renderMonthlyCards(weeks);
    }

    function renderChart(weeks) {
      const ctx = document.getElementById('mainChart').getContext('2d');

      if (chart) {
        chart.destroy();
      }

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: weeks.map(w => w.week),
          datasets: [
            {
              label: 'Avg Attendance %',
              data: weeks.map(w => w.avg_attendance),
              borderColor: '#6c5ce7',
              backgroundColor: 'rgba(108, 92, 231, 0.1)',
              tension: 0.4,
              yAxisID: 'y'
            },
            {
              label: 'Booking Rate %',
              data: weeks.map(w => w.booking_rate),
              borderColor: '#00b894',
              backgroundColor: 'rgba(0, 184, 148, 0.1)',
              tension: 0.4,
              yAxisID: 'y1'
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              labels: { color: '#e4e6ef' }
            }
          },
          scales: {
            y: {
              type: 'linear',
              display: true,
              position: 'left',
              ticks: { color: '#8b8fa3' },
              grid: { color: '#232734' },
              max: 100
            },
            y1: {
              type: 'linear',
              display: true,
              position: 'right',
              ticks: { color: '#8b8fa3' },
              grid: { drawOnChartArea: false },
              max: 100
            },
            x: {
              ticks: { color: '#8b8fa3' },
              grid: { color: '#232734' }
            }
          }
        }
      });
    }

    function renderMonthlyCards(weeks) {
      const html = weeks.map(w => `
        <div class="month-card">
          <div class="month-title">${w.week}</div>
          <div class="month-stat">
            <span class="month-stat-label">Classes</span>
            <span class="month-stat-value">${w.num_classes}</span>
          </div>
          <div class="month-stat">
            <span class="month-stat-label">Avg Attendance</span>
            <span class="month-stat-value">${w.avg_attendance}%</span>
          </div>
          <div class="month-stat">
            <span class="month-stat-label">Booking Rate</span>
            <span class="month-stat-value">${w.booking_rate}%</span>
          </div>
        </div>
      `).join('');

      document.getElementById('monthlyGrid').innerHTML = html || '<p style="color: #8b8fa3;">No data available</p>';
    }

    // ========================================================================
    // TAB SWITCHING
    // ========================================================================

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        const tabName = e.target.getAttribute('data-tab');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        e.target.classList.add('active');
        document.querySelector(`[data-tab="${tabName}"]`).parentElement.querySelector(`[data-tab="${tabName}"]`) ||
          document.querySelectorAll(`.section[data-tab="${tabName}"]`).forEach(s => s.classList.add('active'));

        // Fix tab switching
        document.querySelectorAll('.section').forEach(s => {
          if (s.getAttribute('data-tab') === tabName) {
            s.classList.add('active');
          }
        });
      });
    });

    // ========================================================================
    // INITIALIZATION
    // ========================================================================

    console.log('Dashboard initializing...');
    console.log('Supabase URL:', SUPABASE_URL);
    console.log('Processor URL:', PROCESSOR_URL);

    fetchDataFromSupabase();
  </script>
</body>
</html>
